# DaySim Processing Pipeline Configuration for BATS 2023
# This config file demonstrates the full pipeline with DaySim formatting

# config.yaml

# Define directory shorthands
survey_dir: "C:/Joanne_PSRC/travel_models/travel-diary-survey-tools/projects/psrc_2023/data"
output_dir: "C:/Joanne_PSRC/travel_models/travel-diary-survey-tools/projects/psrc_2023/pipeline_test"
# Pipeline configuration
steps:
  - name: load_data
    validate_input: false # This will override @step(validate=True/False) in the function definition
    cache: true
    params:
      input_paths:
        households: "{{ survey_dir }}/v_households_labels.csv"
        persons: "{{ survey_dir }}/v_persons_labels.csv"
        days: "{{ survey_dir }}/v_days_labels.csv"
        linked_trips: "{{ survey_dir }}/v_trips_labels.csv"

  - name: clean_2023_psrc_hts
    validate_input: false
    cache: true

  # - name: link_trips
  #   validate_input: false
  #   cache: true
  #   params:
  #     change_mode_code: "Change mode"  # Purpose code for 'change_mode'
  #     transit_mode_codes: ["Transit"] # NOTE: this is not elegant
  #     max_dwell_time: 180  # in minutes
  #     dwell_buffer_distance: 100  # in meters

  - name: detect_joint_trips
    validate_input: false
    cache: true
    params:
      config:
        method: "mahalanobis"
        # Covariance for Mahalanobis distance calculation
        # Think of this as the standard deviation of measurement noise in each dimension
        # Diagonal: [origin_var_m^2, dest_var_m^2, depart_var_min^2, arrive_var_min^2]
        # Default [10000, 10000, 100, 100] = 100m, 100m, 10min, 10min std devs
        covariance: [10000, 10000, 100, 100]
        # Confidence level: Higher = stricter matching (fewer detections)
        # 0.90 = 90% confidence (strict), 0.75 = moderate, 0.50 = permissive
        confidence_level: 0.90

        # Alternative: simpler buffer method with time/space thresholds
        # method: "buffer"
        # time_threshold_minutes: 15.0
        # space_threshold_meters: 100.0

  - name: extract_tours
    validate_input: false
    cache: true
    
  - name: locate_parcels
    validate_input: false
    cache: true
    params:
      parcel_geography: "R:/e2projects_two/SoundCast/Inputs/dev/landuse/2023/23_on_23_v3/parcels_urbansim.txt"
      parcel_id: "parcelid"
      x_coord: "xcoord_p"
      y_coord: "ycoord_p"
      crs: "EPSG:2285"
      parcel_to_zones:
        - zone_name: "maz"  
          lookup_file: "R:/e2projects_two/activitysim/conversion/geographic_crosswalks/parcel_taz_block_lookup.csv"
          match_parcel_id: "parcel_id"
          zone_id_field: "maz_id"
        - zone_name: "taz"  
          lookup_file: "R:/e2projects_two/activitysim/conversion/geographic_crosswalks/parcel_taz_block_lookup.csv"
          match_parcel_id: "parcel_id"
          zone_id_field: "taz_id"
          
  # - name: final_check
  #   validate_input: true
  # This prepares a new set of files formatted for DaySim
  - name: format_daysim
    validate_input: false
    cache: false
    params:
      drop_partial_tours: true
      drop_missing_taz: true
      drop_invalid_tours: true